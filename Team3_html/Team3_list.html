<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HELLOWORLD - 숙소 리스트</title>
  <link rel="stylesheet" href="../Team3_css/Team3_common.css">
  <link rel="stylesheet" href="../Team3_css/Team3_list.css">
</head>

<body>

  <!-- 공통 헤더 (1차 프로젝트 동일 스타일) -->
  <header class="header">
    <div class="container header-inner">

      <!-- 로고 -->
      <div class="logo">NANOBANANA</div>

      <!-- 검색창 -->
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Search">
      </div>

      <!-- 오른쪽 메뉴 -->
      <nav class="nav">
        <a href="#">동행</a>
        <a href="#">회원신청</a>
        <a href="#" class="mypage">
          <span class="user-icon">👤</span>
          마이페이지
        </a>
      </nav>

    </div>
  </header>

  <!-- 상단 검색 정보 -->
  <div class="top-info">
    서울 · 10월 25일 - 10월 27일 · 성인 2명
  </div>

  <div class="container list-layout">

    <!-- 필터 영역 -->
    <aside class="filter">
      <h3>필터</h3>

      <div class="filter-group">
        <h4>가격</h4>
        <input type="range" min="50000" max="300000">
        <p>₩120,000 - ₩150,000</p>
      </div>

      <div class="filter-group">
        <h4>호텔 등급</h4>
        <label><input type="checkbox"> 3성급</label>
        <label><input type="checkbox"> 4성급</label>
        <label><input type="checkbox"> 5성급</label>
      </div>

      <div class="filter-group">
        <h4>편의 시설</h4>
        <label><input type="checkbox"> 무료 Wi-Fi</label>
        <label><input type="checkbox"> 수영장</label>
        <label><input type="checkbox"> 조식 포함</label>
      </div>
    </aside>


    <!-- 숙소 리스트 -->
    <section class="hotel-list">

      <!-- ✅ 정렬 탭 -->
      <div class="sort-bar">
        <button class="sort-item active">추천순</button>
        <button class="sort-item">요금 낮은 순</button>
        <button class="sort-item">평점 높은 순</button>
      </div>

      <!-- 카드 1 -->
      <div class="hotel-card">
        <img src="https://picsum.photos/300/200?1">
        <div class="hotel-info">
          <h3>나노 호텔 서울</h3>
          <p class="location">서울 · 우수함 (1,240개 이용후기)</p>
          <div class="tags">
            <span>무료 Wi-Fi</span>
            <span>수영장</span>
          </div>
        </div>
        <div class="price-box">
          <div class="price">₩120,000</div>
          <button>예약하기</button>
        </div>
      </div>

      <!-- 카드 2 -->
      <div class="hotel-card">
        <img src="https://picsum.photos/300/200?2">
        <div class="hotel-info">
          <h3>나노 프리미엄 호텔</h3>
          <p class="location">서울 · 우수함 (980개 이용후기)</p>
          <div class="tags">
            <span>무료 Wi-Fi</span>
            <span>조식 포함</span>
          </div>
        </div>
        <div class="price-box">
          <div class="price">₩150,000</div>
          <button>예약하기</button>
        </div>
      </div>

      <!-- 카드 3 -->
      <div class="hotel-card">
        <img src="https://picsum.photos/300/200?3">
        <div class="hotel-info">
          <h3>서울 시티 호텔</h3>
          <p class="location">서울 · 매우 좋음 (750개 이용후기)</p>
          <div class="tags">
            <span>무료 Wi-Fi</span>
          </div>
        </div>
        <div class="price-box">
          <div class="price">₩98,000</div>
          <button>예약하기</button>
        </div>
      </div>

    </section>

  </div>

</body>

</html>
