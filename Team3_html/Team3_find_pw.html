<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>NANOBANANA - 비밀번호 찾기</title>

  <link rel="stylesheet" href="../Team3_css/Team3_common.css">
  <link rel="stylesheet" href="../Team3_css/Team3_find_account.css">
  <script src="../Team3_js\Team3_find_pw.js"></script>
</head>
<body>

<main class="container find-wrap">
  <h1 class="find-title">비밀번호 찾기</h1>

  <div class="tabs">
    <a href="#" class="tab-item">아이디 찾기</a>
    <a href="#" class="tab-item active">비밀번호 찾기</a>
  </div>

  <form class="find-form">

    <div class="form-group">
      <label for="email">이메일</label>
      <input id="email" type="text" placeholder="이메일을 입력해주세요">
    </div>

    <button type="button" class="find-btn">비밀번호 찾기</button>

    <p class="error-msg hide"></p>

  </form>

</main>

</body>
</html>
