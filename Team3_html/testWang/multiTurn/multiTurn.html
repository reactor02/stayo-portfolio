<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제미나이 상담 센터</title>
    <link rel="stylesheet" href="multiTurn.css">
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span class="title">CS Center</span>
        <span class="status">● Online</span>
    </div>
    
    <div id="chat-box" class="chat-box">
        <div class="message model">
            <div class="bubble">무엇을 도와드릴까요?</div>
        </div>
    </div>
    

    <div class="chat-input-area">
        <textarea id="prompt" placeholder="메시지를 입력하세요..." rows="1"></textarea>
        <button id="ask-btn">전송</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
