<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PHI · 흡연구역 · 나만의 스팟</title>

  <link rel="stylesheet" href="./css/phi.css" />

  <!-- Kakao Maps -->
  <script type="text/javascript"
    src="//dapi.kakao.com/v2/maps/sdk.js?appkey=47bbd47c04e70af1e13f9280c52c609b&autoload=false"></script>

  <!-- jQuery -->
  <script src="../js/jquery-3.7.1.js"></script>

  <!-- ✅ API 먼저 -->
  <script src="./js/dd.api.v1.js" defer></script>

  <!-- App -->
  <script src="./js/phi.js" defer></script>

  <!-- ✅ 테스트 호출 -->
  <script defer>
    $(() => {

      /* =========================================================
       * 0) 전체 API 목록(그룹별) + 사용처
       * =========================================================
       *
       * [DD 그룹] base: /api/v1/dd (지도/스팟/댓글/태그랭킹)
       * DD-1) GET  /dd/posts                         // 지도 마커 목록(검색/영역/페이지)
       * DD-2) GET  /dd/posts/:postNo                 // 마커 클릭 상세
       * DD-3) POST /dd/posts                         // 스팟 등록(지도 클릭)
       * DD-4) GET  /dd/posts/:postNo/comments        // 댓글 목록
       * DD-5) POST /dd/posts/:postNo/comments        // 댓글/대댓글 등록
       * DD-6) GET  /dd/tags/top?limit&days           // 실시간 태그 TOP10
       *
       * [TB 그룹 = LODG 포함] base: /api/v1 (숙소/유저기능)
       * TB-LOD-1) GET  /lodging/properties               // 숙소 리스트/검색/필터
       * TB-LOD-2) GET  /lodging/properties/:propertyId   // 숙소 상세
       * TB-LOD-3) GET  /lodging/properties/:propertyId/rooms
       * TB-LOD-4) GET  /lodging/properties/:propertyId/reviews
       * TB-LOD-5) GET  /lodging/properties/:propertyId/rating-summary
       * TB-LOD-6) GET  /lodging/cities
       * TB-LOD-7) GET  /lodging/districts
       * TB-LOD-8) GET  /lodging/city-counts
       * TB-LOD-9) GET  /lodging/payload
       *
       * TB-USR-1) POST /searches                         // 검색어 로그 저장(실시간 검색어 원천)
       * TB-USR-2) GET  /searches                         // 검색어 로그 조회
       * TB-USR-3) POST /wishlist/toggle                  // 찜 토글
       * TB-USR-4) GET  /wishlist                         // 찜 목록
       *
       * [SJ 그룹] base: /api/v1/sj (게시판)
       * SJ-AUTH-1) GET  /sj/auth/check-login-id           // 아이디 중복
       * SJ-AUTH-2) POST /sj/auth/signup                   // 회원가입
       * SJ-AUTH-3) POST /sj/auth/login                    // 로그인
       * SJ-POST-1) GET  /sj/posts                         // 글 목록
       * SJ-POST-3) POST /sj/posts                         // 글 생성
       * SJ-CMT-1) GET  /sj/posts/:postId/comments         // 댓글 목록
       * SJ-CMT-2) POST /sj/posts/:postId/comments         // 댓글 생성
       * ========================================================= */

      // =========================================================
      // 실행 토글 (필요한 것만 true)
      // =========================================================
      const RUN = {
        DD: { postsFlow: true, tagsTop10: true },
        TB: { lodgingChain: true, searchLog: true, wishlist: false }, // wishlist는 memberId 실제값 필요해서 기본 OFF
        SJ: { auth: true, postsAndComments: true }
      };

      // =========================================================
      // 공통 로그 유틸
      // =========================================================
      const logCall = (label, method, url, body) => {
        console.log(`[CALL] ${label} :: ${method} ${url}`);
        if (body !== undefined) console.log(`[BODY] ${label}`, body);
      };

      const logRes = (label, res) => console.log(`[RES] ${label}`, res);
      const logErr = (label, xhr) => {
        const rj = xhr?.responseJSON;
        const status = xhr?.status;
        const msg = rj?.message || rj?.error || xhr?.statusText || "요청 실패";
        console.log(`[ERR] ${label} :: status=${status}`, rj || msg);
      };

      // =========================================================
      // DD-6) 태그 TOP10 렌더
      // =========================================================
      const renderTagTop10 = (res) => {
        const $ol = $("#tag-top10");
        if ($ol.length === 0) return;

        const items = res?.items || res?.data?.items || res?.data || [];
        if (!Array.isArray(items) || items.length === 0) {
          $ol.html(`<li class="dd-muted">(아직 태그 없음)</li>`);
          return;
        }

        const html = items.slice(0, 10).map((it) => {
          const tag = (it.tag ?? it.keyword ?? it.name ?? it.text ?? "").toString();
          const count = (it.count ?? it.cnt ?? it.total ?? it.value ?? "").toString();
          const safeTag = tag ? tag : "(unknown)";
          const safeCount = count ? ` <span class="dd-muted">(${count})</span>` : "";
          return `<li>${safeTag}${safeCount}</li>`;
        }).join("");

        $ol.html(html);
      };

      // =========================================================
      // DD-1~5) 스팟 등록 -> 목록/상세/댓글 저장/조회 전체 플로우
      // =========================================================
      const ddRunPostsFlow = async () => {
        // DD-3) 스팟 생성 (저장)
        const createBody = {
          authorNo: 1,
          title: `흡연구역 발견 - 데모 ${Date.now()}`,
          content: "바람 덜 불어서 좋음(DD 저장 테스트)",
          latitude: 36.3504,
          longitude: 127.3845,
          tags: ["흡연", "대전", "demo"]
        };
        const createUrl = DD.V1.url(DD.V1.API.POSTS_CREATE);
        logCall("DD-3 POSTS_CREATE", "POST", createUrl, createBody);

        let createRes;
        try {
          createRes = await DD.V1.Posts.create(createBody);
          logRes("DD-3 POSTS_CREATE", createRes);
        } catch (e) {
          logErr("DD-3 POSTS_CREATE", e);
          return;
        }

        const postNo =
          createRes?.postNo ?? createRes?.data?.postNo ?? createRes?.item?.postNo ??
          createRes?.data?.item?.postNo;

        if (!postNo) {
          console.log("[STOP] DD 플로우 중단: create 응답에서 postNo를 못 찾음");
          return;
        }

        // DD-1) 목록 조회 (방금 만든 태그로 검색)
        const listQuery = { q: "demo", page: 1, pageSize: 20 };
        const listUrl = DD.V1.url(DD.V1.API.POSTS_LIST, null, listQuery);
        logCall("DD-1 POSTS_LIST", "GET", listUrl);

        try {
          const listRes = await DD.V1.Posts.list(listQuery);
          logRes("DD-1 POSTS_LIST", listRes);
        } catch (e) {
          logErr("DD-1 POSTS_LIST", e);
        }

        // DD-2) 상세 조회
        const detailUrl = DD.V1.url(DD.V1.API.POSTS_DETAIL, { postNo });
        logCall("DD-2 POSTS_DETAIL", "GET", detailUrl);

        try {
          const detailRes = await DD.V1.Posts.get(postNo);
          logRes("DD-2 POSTS_DETAIL", detailRes);
        } catch (e) {
          logErr("DD-2 POSTS_DETAIL", e);
        }

        // DD-5) 댓글 등록
        const cmtBody = {
          authorNo: 1,
          content: `댓글 저장 테스트 ${new Date().toLocaleString()}`,
          parentCommentNo: null
        };
        const cmtAddUrl = DD.V1.url(DD.V1.API.COMMENTS_ADD, { postNo });
        logCall("DD-5 COMMENTS_ADD", "POST", cmtAddUrl, cmtBody);

        try {
          const addRes = await DD.V1.Comments.add(postNo, cmtBody);
          logRes("DD-5 COMMENTS_ADD", addRes);
        } catch (e) {
          logErr("DD-5 COMMENTS_ADD", e);
        }

        // DD-4) 댓글 목록 조회
        const cmtListUrl = DD.V1.url(DD.V1.API.COMMENTS_LIST, { postNo });
        logCall("DD-4 COMMENTS_LIST", "GET", cmtListUrl);

        try {
          const listRes = await DD.V1.Comments.list(postNo);
          logRes("DD-4 COMMENTS_LIST", listRes);
        } catch (e) {
          logErr("DD-4 COMMENTS_LIST", e);
        }
      };

      // =========================================================
      // TB-LOD-1~4) 숙소 리스트 -> 상세/객실/리뷰 연쇄
      // =========================================================
      const tbRunLodgingChain = async () => {
        const q = { page: 1, pageSize: 5 };
        const url = DD.V1.url(DD.V1.API.TB_LODG_PROPERTIES_LIST, null, q);
        logCall("TB-LOD-1 PROPERTIES_LIST", "GET", url);

        let listRes;
        try {
          listRes = await DD.V1.TB.Lodging.list(q);
          logRes("TB-LOD-1 PROPERTIES_LIST", listRes);
        } catch (e) {
          logErr("TB-LOD-1 PROPERTIES_LIST", e);
          return;
        }

        const items = listRes?.items || listRes?.data?.items || [];
        const first = Array.isArray(items) ? items[0] : null;
        const propertyId = first?.propertyId || first?.id || first?.property_id;
        if (!propertyId) {
          console.log("[SKIP] TB-LOD-2~4: propertyId 못 찾음");
          return;
        }

        // TB-LOD-2
        const durl = DD.V1.url(DD.V1.API.TB_LODG_PROPERTIES_DETAIL, { propertyId });
        logCall("TB-LOD-2 PROPERTIES_DETAIL", "GET", durl);
        DD.V1.TB.Lodging.get(propertyId).then(r => logRes("TB-LOD-2 PROPERTIES_DETAIL", r)).catch(e => logErr("TB-LOD-2 PROPERTIES_DETAIL", e));

        // TB-LOD-3
        const rurl = DD.V1.url(DD.V1.API.TB_LODG_PROPERTIES_ROOMS, { propertyId });
        logCall("TB-LOD-3 PROPERTIES_ROOMS", "GET", rurl);
        DD.V1.TB.Lodging.rooms(propertyId).then(r => logRes("TB-LOD-3 PROPERTIES_ROOMS", r)).catch(e => logErr("TB-LOD-3 PROPERTIES_ROOMS", e));

        // TB-LOD-4
        const rq = { page: 1, pageSize: 5 };
        const rvurl = DD.V1.url(DD.V1.API.TB_LODG_PROPERTIES_REVIEWS, { propertyId }, rq);
        logCall("TB-LOD-4 PROPERTIES_REVIEWS", "GET", rvurl);
        DD.V1.TB.Lodging.reviews(propertyId, rq).then(r => logRes("TB-LOD-4 PROPERTIES_REVIEWS", r)).catch(e => logErr("TB-LOD-4 PROPERTIES_REVIEWS", e));
      };

      // =========================================================
      // TB-USR-1~2) 검색어 로그 저장 -> 조회
      // =========================================================
      const tbRunSearchLog = async () => {
        const bodies = [
          { memberId: null, keyword: "흡연", city: "대전" },
          { memberId: null, keyword: "흡연", city: "대전" },
          { memberId: null, keyword: "흡연구역", city: "대전" },
        ];

        for (let i = 0; i < bodies.length; i++) {
          const b = bodies[i];
          const url = DD.V1.url(DD.V1.API.TB_SEARCH_LOG_CREATE);
          logCall(`TB-USR-1 SEARCH_LOG_CREATE#${i + 1}`, "POST", url, b);
          try {
            const r = await DD.V1.TB.Searches.create(b);
            logRes(`TB-USR-1 SEARCH_LOG_CREATE#${i + 1}`, r);
          } catch (e) {
            logErr(`TB-USR-1 SEARCH_LOG_CREATE#${i + 1}`, e);
          }
        }

        const q = { page: 1, pageSize: 50 };
        const lurl = DD.V1.url(DD.V1.API.TB_SEARCH_LOG_LIST, null, q);
        logCall("TB-USR-2 SEARCH_LOG_LIST", "GET", lurl);
        DD.V1.TB.Searches.list(q).then(r => logRes("TB-USR-2 SEARCH_LOG_LIST", r)).catch(e => logErr("TB-USR-2 SEARCH_LOG_LIST", e));
      };

      // =========================================================
      // SJ: auth -> 글 생성 -> 댓글 생성 -> 댓글 목록
      // =========================================================
      const sjRun = async () => {
        const SJ_ID = "admin12";
        const SJ_PW = "admin1234";
        const SJ_NICK = "SJ테스트유저";

        // SJ-AUTH-1) 중복 체크
        const checkQ = { loginId: SJ_ID };
        const checkUrl = DD.V1.url(DD.V1.API.SJ_AUTH_CHECK_ID, null, checkQ);
        logCall("SJ-AUTH-1 CHECK_ID", "GET", checkUrl);

        let checkRes;
        try {
          checkRes = await DD.V1.SJ.Auth.checkLoginId(checkQ);
          logRes("SJ-AUTH-1 CHECK_ID", checkRes);
        } catch (e) {
          logErr("SJ-AUTH-1 CHECK_ID", e);
          return;
        }

        const exists = !!checkRes?.exists;

        // SJ-AUTH-2) 회원가입 (없을 때만)
        if (!exists) {
          const signupBody = { loginId: SJ_ID, password: SJ_PW, nickname: SJ_NICK };
          const signupUrl = DD.V1.url(DD.V1.API.SJ_AUTH_SIGNUP);
          logCall("SJ-AUTH-2 SIGNUP", "POST", signupUrl, signupBody);
          try {
            const signupRes = await DD.V1.SJ.Auth.signup(signupBody);
            logRes("SJ-AUTH-2 SIGNUP", signupRes);
          } catch (e) {
            logErr("SJ-AUTH-2 SIGNUP", e);
            return;
          }
        } else {
          console.log("[SKIP] SJ-AUTH-2 SIGNUP: 이미 존재해서 생략");
        }

        // SJ-AUTH-3) 로그인
        const loginBody = { loginId: SJ_ID, password: SJ_PW };
        const loginUrl = DD.V1.url(DD.V1.API.SJ_AUTH_LOGIN);
        logCall("SJ-AUTH-3 LOGIN", "POST", loginUrl, loginBody);

        let loginRes;
        try {
          loginRes = await DD.V1.SJ.Auth.login(loginBody);
          logRes("SJ-AUTH-3 LOGIN", loginRes);
        } catch (e) {
          logErr("SJ-AUTH-3 LOGIN", e);
          console.log("=> 로그인 실패면 SJ 글/댓글 테스트는 중단");
          return;
        }

        // SJ-POST-1) 글 목록
        const listQ = { page: 1, pageSize: 10 };
        const listUrl = DD.V1.url(DD.V1.API.SJ_POSTS_LIST, null, listQ);
        logCall("SJ-POST-1 POSTS_LIST", "GET", listUrl);
        try {
          const listRes = await DD.V1.SJ.Posts.list(listQ);
          logRes("SJ-POST-1 POSTS_LIST", listRes);
        } catch (e) {
          logErr("SJ-POST-1 POSTS_LIST", e);
        }

        // SJ-POST-3) 글 생성
        const createBody = {
          authorId: SJ_ID,
          title: `SJ 저장 테스트 ${Date.now()}`,
          content: "내용 저장 테스트",
          tags: ["demo", "test"]
        };
        const createUrl = DD.V1.url(DD.V1.API.SJ_POSTS_CREATE);
        logCall("SJ-POST-3 POSTS_CREATE", "POST", createUrl, createBody);

        let createRes;
        try {
          createRes = await DD.V1.SJ.Posts.create(createBody);
          logRes("SJ-POST-3 POSTS_CREATE", createRes);
        } catch (e) {
          logErr("SJ-POST-3 POSTS_CREATE", e);
          return;
        }

        const postId =
          createRes?.item?.postId ?? createRes?.data?.item?.postId ??
          createRes?.postId ?? createRes?.data?.postId ??
          createRes?.item?.id ?? createRes?.data?.item?.id ??
          createRes?.id ?? createRes?.data?.id;

        if (!postId) {
          console.log("[STOP] SJ 댓글 테스트 중단: create 응답에서 postId를 못 찾음");
          return;
        }

        // SJ-CMT-2) 댓글 생성
        const cmtBody = { authorId: SJ_ID, content: `SJ 댓글 저장 테스트 ${Date.now()}`, parentCommentId: null };
        const cmtCreateUrl = DD.V1.url(DD.V1.API.SJ_COMMENTS_CREATE, { postId });
        logCall("SJ-CMT-2 COMMENTS_CREATE", "POST", cmtCreateUrl, cmtBody);

        try {
          const cmtRes = await DD.V1.SJ.Comments.create(postId, cmtBody);
          logRes("SJ-CMT-2 COMMENTS_CREATE", cmtRes);
        } catch (e) {
          logErr("SJ-CMT-2 COMMENTS_CREATE", e);
        }

        // SJ-CMT-1) 댓글 목록
        const cmtListQ = { page: 1, pageSize: 50 };
        const cmtListUrl = DD.V1.url(DD.V1.API.SJ_COMMENTS_LIST, { postId }, cmtListQ);
        logCall("SJ-CMT-1 COMMENTS_LIST", "GET", cmtListUrl);

        try {
          const listRes = await DD.V1.SJ.Comments.list(postId, cmtListQ);
          logRes("SJ-CMT-1 COMMENTS_LIST", listRes);
        } catch (e) {
          logErr("SJ-CMT-1 COMMENTS_LIST", e);
        }
      };

      // =========================================================
      // 실행
      // =========================================================
      (async () => {
        if (RUN.DD.tagsTop10) {
          const q = { limit: 10, days: 7 };
          const url = DD.V1.url(DD.V1.API.DD_TAGS_TOP, null, q);
          logCall("DD-6 DD_TAGS_TOP", "GET", url);
          DD.V1.Tags.top(q).then(res => { logRes("DD-6 DD_TAGS_TOP", res); renderTagTop10(res); }).catch(e => logErr("DD-6 DD_TAGS_TOP", e));
        }

        if (RUN.DD.postsFlow) {
          await ddRunPostsFlow();
        }

        if (RUN.TB.lodgingChain) {
          await tbRunLodgingChain();
        }

        if (RUN.TB.searchLog) {
          await tbRunSearchLog();
        }

        if (RUN.SJ.auth || RUN.SJ.postsAndComments) {
          await sjRun();
        }
      })();

    });
  </script>
</head>

<body>
  <div id="map-wrap" class="dd-map-wrap">
    <div id="map"></div>

    <div class="dd-map-ui dd-topbar">
      <div class="dd-topbar-left">
        <div class="dd-title">PHI · 흡연구역 · 나만의 스팟</div>
      </div>
      <div class="dd-topbar-right">
        <button id="mylocation" class="dd-btn">현위치</button>
        <button id="regmode" class="dd-btn dd-btn-primary" aria-pressed="false">등록 모드</button>
      </div>
    </div>

    <div class="dd-map-ui dd-rightpanel" aria-label="실시간 랭킹 패널">
      <div class="dd-card">
        <div class="dd-card-title">실시간 태그 TOP 10</div>
        <div class="dd-card-sub">등록된 스팟의 태그로 집계</div>
        <ol id="tag-top10" class="dd-rank-list">
          <li class="dd-muted">(아직 태그 없음)</li>
        </ol>
      </div>

      <div class="dd-card">
        <div class="dd-card-title">사용 팁</div>
        <ul class="dd-tip">
          <li>등록 모드 켜고 지도 클릭 → 스팟 등록</li>
          <li>태그는 <b>#</b> 붙여도 되고, 공백/콤마로 구분</li>
          <li>마커 클릭 → (다음 단계) 상세/댓글</li>
        </ul>
      </div>
    </div>
  </div>
</body>

</html>
